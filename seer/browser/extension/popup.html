<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui; padding: 14px; width: 220px; color: #1c2133; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.ok { background: #3cc85a; }
  .dot.bad { background: #ef4444; }
  .hint { font-size: 11px; color: #6b7280; line-height: 1.4; }
  a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
<h1>Seer Bridge</h1>
<div class="status">
  <div class="dot" id="dot"></div>
  <span id="label">Checking...</span>
</div>
<div class="hint" id="hint">
  Pairs with the Seer desktop app.<br>
  <a href="https://github.com/av29nassh-sketch/seer" target="_blank">github.com/av29nassh-sketch/seer</a>
</div>
<script src="popup.js"></script>
</body>
</html>
